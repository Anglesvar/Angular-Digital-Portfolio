@if (data(); as d) {
  <section id="home" class="hero" [style.--bg-url]="'url(' + d.backgrounds.hero + ')'">
    <div class="hero__bg"></div>
    <app-particles />
    <div class="hero__orb hero__orb--teal"></div>
    <div class="hero__orb hero__orb--blue"></div>

    <div class="hero__content">
      <p class="hero__eyebrow">HELLO, WORLD</p>
      <h1 class="hero__name">
        {{ d.personal.firstName }}<br />
        <span class="hero__name--accent">{{ d.personal.middleName }}</span>
        <span class="hero__name--outline">{{ d.personal.lastName }}</span>
      </h1>
      <p class="hero__desc">
        <app-typewriter [text]="d.personal.devDesc" />
      </p>
      <div class="hero__cta">
        <app-button [href]="d.personal.resumeLink" variant="primary" target="_blank" rel="noopener noreferrer">
          Download Resume ↗
        </app-button>
        <app-button href="#contact" variant="outline">
          Get In Touch
        </app-button>
      </div>
      <div class="hero__socials">
        @for (s of d.social; track s.id) {
          <a [href]="s.url" target="_blank" rel="noopener noreferrer"
             class="hero__social-icon" [attr.aria-label]="s.label">
            <i [class]="s.icon"></i>
          </a>
        }
      </div>
    </div>

    <div class="hero__scroll">
      <span class="hero__scroll-label">SCROLL</span>
      <div class="hero__scroll-line"></div>
    </div>
  </section>
}
